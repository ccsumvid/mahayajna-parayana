<title>Gita Parayana Pace Helper</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; }
body {
  background: #000;
  color: #fff;
  font-family: 'Noto Sans Devanagari', 'Noto Sans', Arial, sans-serif;
  display: flex;
  flex-direction: column;
}
#display {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  position: relative;
  padding: 40px 60px;
}
#pace-indicator {
  position: absolute;
  top: 20px;
  right: 40px;
  font-size: 48px;
  opacity: 0.9;
  display: none;
}
#countdown-overlay {
  position: absolute;
  inset: 0;
  background: #000;
  display: none;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 100;
}
#countdown-overlay .countdown-label {
  font-size: 3vw;
  color: #FFD700;
  margin-bottom: 40px;
}
#countdown-overlay .countdown-number {
  font-size: 12vw;
  color: #fff;
  font-weight: bold;
}
.verse-line {
  font-size: 2.2vw;
  letter-spacing: 0.15em;
  margin: 1.5em 0;
  position: relative;
  white-space: nowrap;
  line-height: 1.4;
}
.syllable {
  display: inline-block;
  position: relative;
  transition: color 0.1s;
}
.syllable.active {
  color: #FFD700;
}
.syllable.done {
  color: #888;
}
.verse-marker {
  display: inline-block;
  margin-left: 0.3em;
  color: #666;
}
#pointer {
  position: absolute;
  font-size: 36px;
  transition: left 0.3s linear, top 0.15s ease-out;
  z-index: 10;
  pointer-events: none;
  display: none;
}
#controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
  padding: 12px 20px;
  background: #111;
  border-top: 1px solid #333;
  flex-wrap: wrap;
}
#controls label {
  color: #ccc;
  font-size: 14px;
}
#controls input,
#controls button,
#controls select {
  background: #222;
  color: #fff;
  border: 1px solid #444;
  font-size: 14px;
  padding: 6px 12px;
  border-radius: 4px;
  cursor: pointer;
}
#controls input[type="number"] {
  width: 70px;
  text-align: center;
}
#controls button:hover {
  background: #333;
}
.mode-btn.selected {
  background: #c94;
  color: #000;
}
#controls .separator {
  width: 1px;
  height: 24px;
  background: #444;
}
#page-info {
  color: #ccc;
  font-size: 14px;
  min-width: 50px;
  text-align: center;
}
#btn-speedup.active, #btn-slowdown.active {
  background: #c94;
  color: #000;
}
</style>
</head>

  }

  // Long vowels and their dependent (matra) forms
  const LONG_VOWELS = new Set(['आ', 'ई', 'ऊ', 'ॠ', 'ॡ', 'ए', 'ऐ', 'ओ', 'औ']);
  const LONG_VOWEL_SIGNS = new Set([
    '\u093E', // aa
    '\u0940', // ii
    '\u0942', // uu
    '\u0944', // RR
    '\u0963', // LL
    '\u0947', // e
    '\u0948', // ai
    '\u094B', // o
    '\u094C', // au
  ]);

  /**
   * splitSyllables(word) — Split a Devanagari word into syllable strings.
   *
   * Consonant: consume virama+consonant conjuncts, then vowel sign (or implicit 'a'),
   * then anusvara/visarga/chandrabindu = one syllable.
   * Standalone vowel: consume + anusvara/visarga = one syllable.
   * Skip non-Devanagari characters.
   */
  function splitSyllables(word) {
    const syllables = [];
    const chars = Array.from(word); // handle multi-code-unit chars properly
    let i = 0;

    while (i < chars.length) {
      const ch = chars[i];

      if (isConsonant(ch)) {
        // Start of a consonant-based syllable
        let syl = ch;
        i++;

        // Consume virama + consonant conjuncts
        while (i < chars.length && isVirama(chars[i])) {
          syl += chars[i]; // virama
          i++;
          if (i < chars.length && isConsonant(chars[i])) {
            syl += chars[i]; // next consonant in conjunct
            i++;
          }
        }

        // Consume vowel sign (matra) if present, otherwise implicit 'a'
        if (i < chars.length && isVowelSign(chars[i])) {
          syl += chars[i];
          i++;
        }

        // Consume anusvara, visarga, chandrabindu
        while (i < chars.length && (isAnusvara(chars[i]) || isVisarga(chars[i]) || isChandrabindu(chars[i]))) {
          syl += chars[i];
          i++;
        }

        syllables.push(syl);

      } else if (isVowel(ch)) {
        // Standalone vowel syllable
        let syl = ch;
        i++;

        // Consume anusvara, visarga, chandrabindu
        while (i < chars.length && (isAnusvara(chars[i]) || isVisarga(chars[i]) || isChandrabindu(chars[i]))) {
          syl += chars[i];
          i++;
        }

        syllables.push(syl);

      } else {
        // Skip non-Devanagari (spaces, punctuation, nukta, etc.)
        i++;
      }
    }

    return syllables;
  }

  /**
   * isGuru(syllable, nextSyllable) — Determine if a syllable is guru (heavy).
   *
   * Guru if:
   * - Contains a long vowel or long vowel sign
   * - Contains anusvara or visarga
   * - Next syllable starts with 2+ consonants (positional weight from conjunct)
   */
  function isGuru(syllable, nextSyllable) {
    const sylChars = Array.from(syllable);

    // Check for long vowel (independent form)
    for (const ch of sylChars) {
      if (LONG_VOWELS.has(ch)) return true;
    }

    // Check for long vowel sign (dependent matra)
    for (const ch of sylChars) {
      if (LONG_VOWEL_SIGNS.has(ch)) return true;
    }

    // Check for anusvara or visarga
    for (const ch of sylChars) {
      if (isAnusvara(ch) || isVisarga(ch)) return true;
    }

    // Check positional weight: next syllable starts with 2+ consonants
    if (nextSyllable) {
      const nextChars = Array.from(nextSyllable);
      let consonantCount = 0;
      for (const ch of nextChars) {
        if (isConsonant(ch)) {
          consonantCount++;
        } else if (isVirama(ch)) {
          // virama between consonants in conjunct — continue counting
          continue;
        } else {
          break;
        }
      }
      if (consonantCount >= 2) return true;
    }

    return false;
  }

  /**
   * analyzeLine(text) — Analyze a full line of Sanskrit text.
   *
   * Returns array of token objects:
   * { text, beats, isMarker, isGuru, wordEnd }
   *
   * Words "|" or "||" become markers with 2 or 4 beats.
   * Other words are split into syllables and classified.
   */
  function analyzeLine(text) {
    const words = text.split(/\s+/).filter(w => w.length > 0);
    const tokens = [];

    for (let wi = 0; wi < words.length; wi++) {
      const word = words[wi];

      // Check for verse markers
      if (word === '|' || word === '||') {
        tokens.push({
          text: word,
          beats: word === '||' ? 4 : 2,
          isMarker: true,
          isGuru: false,
          wordEnd: true
        });
        continue;
      }

      const syllables = splitSyllables(word);

      for (let si = 0; si < syllables.length; si++) {
        const syl = syllables[si];
        // Next syllable: within same word or first syllable of next non-marker word
        let nextSyl = null;
        if (si + 1 < syllables.length) {
          nextSyl = syllables[si + 1];
        } else {
          // Look at the next word's first syllable
          for (let nw = wi + 1; nw < words.length; nw++) {
            if (words[nw] !== '|' && words[nw] !== '||') {
              const nextWordSyls = splitSyllables(words[nw]);
              if (nextWordSyls.length > 0) {
                nextSyl = nextWordSyls[0];
              }
              break;
            }
          }
        }

        const guru = isGuru(syl, nextSyl);
        tokens.push({
          text: syl,
          beats: guru ? 2 : 1,
          isMarker: false,
          isGuru: guru,
          wordEnd: si === syllables.length - 1
        });
      }
    }

    // Pāda-end guru rule: syllable immediately before a marker is always guru
    for (let ti = 1; ti < tokens.length; ti++) {
      if (tokens[ti].isMarker && !tokens[ti - 1].isMarker) {
        tokens[ti - 1].isGuru = true;
        tokens[ti - 1].beats = 2;
      }
    }

    return tokens;
  }

  return { splitSyllables, isGuru, analyzeLine };
})();

// ============================================================
// Task 3: Data Layer (lazy-load current + prefetch next)
// ============================================================
const dataLayer = (function() {
  'use strict';

  let pages = [];
  let chapterName = '';
  let currentChapterNum = -1;
  const cache = {}; // chapterNum -> parsed JSON data

  function groupIntoPages(shlokas) {
    const result = [];

    for (const shloka of shlokas) {
      const headerEntries = shloka.entry.filter(e => e.sty === 'fh' || e.sty === 'th' || e.sty === 'uh');
      const regularEntries = shloka.entry.filter(e => e.sty !== 'fh' && e.sty !== 'th' && e.sty !== 'uh');

      for (const hdr of headerEntries) {
        result.push({
          shlokaNum: shloka.shlokaNum,
          lines: [{ text: hdr.text, iast: hdr.iast || '', swhtsp: hdr.swhtsp, sty: hdr.sty }],
          isHeader: true
        });
      }

      if (regularEntries.length > 0) {
        result.push({
          shlokaNum: shloka.shlokaNum,
          lines: regularEntries.map(e => ({ text: e.text, iast: e.iast || '', swhtsp: e.swhtsp, sty: e.sty })),
          isHeader: false
        });
      }
    }

    return result;
  }

  async function loadChapterData(chapterNum) {
    if (cache[chapterNum]) return cache[chapterNum];

    if (chapterNum === 0) {
      cache[0] = EMBEDDED_DHYANA;
      return EMBEDDED_DHYANA;
    }

    const padded = String(chapterNum).padStart(2, '0');
    const url = `data/chapter_${padded}.json`;
    const resp = await fetch(url);
    if (!resp.ok) throw new Error(`HTTP ${resp.status} loading chapter ${padded}`);
    const data = await resp.json();
    cache[chapterNum] = data;
    return data;
  }

  function prefetch(chapterNum) {
    if (chapterNum >= 0 && chapterNum <= 18 && !cache[chapterNum]) {
      loadChapterData(chapterNum).catch(() => {});
    }
  }

  async function fetchChapter(chapterNum) {
    const data = await loadChapterData(chapterNum);
    currentChapterNum = chapterNum;
    chapterName = data.name || '';
    pages = groupIntoPages(data.shloka || []);

    // Prefetch next chapter in background
    if (chapterNum < 18) prefetch(chapterNum + 1);

    return { name: chapterName, pageCount: pages.length };
  }

  function getPage(index) {
    if (index < 0 || index >= pages.length) return null;
    return pages[index];
  }

  function getPageCount() {
    return pages.length;
  }

  function getChapterName() {
    return chapterName;
  }

  function getCurrentChapterNum() {
    return currentChapterNum;
  }

  return { fetchChapter, getPage, getPageCount, getChapterName, getCurrentChapterNum };
})();

// ============================================================
// Task 4: UI Renderer
// ============================================================
const renderer = (function() {
  'use strict';

  let currentMode = 'asterisk';
  let currentPageData = null;
  let syllableElements = [];

  // Double-buffer: render next page into the hidden buffer, swap on advance
  const buffers = [
    document.getElementById('verse-container-a'),
    document.getElementById('verse-container-b')
  ];
  let activeBuffer = 0; // index into buffers[]
  let backBuffer = null; // { index, chapterNum, elements } or null

  /**
   * renderInto(target, pageData) — Render a page into a specific buffer element.
   * Returns the syllable elements array.
   */
  function renderInto(target, pageData) {
    target.textContent = '';
    const elements = [];

    for (const line of pageData.lines) {
      const lineDiv = document.createElement('div');
      lineDiv.className = 'verse-line';

      if (pageData.isHeader) {
        const displayText = currentMode === 'iast' ? (line.iast || line.text) : line.text;
        const textNode = document.createTextNode(displayText);
        lineDiv.appendChild(textNode);
        if (line.sty === 'fh') {
          lineDiv.style.color = '#FFD700';
          lineDiv.style.fontSize = '3vw';
        }
        target.appendChild(lineDiv);
        continue;
      }

      const lineStartIndex = elements.length;

      if (currentMode === 'iast' && line.iast) {
        // IAST mode: show full line as one span with total beats from Devanagari analysis
        const tokens = prosody.analyzeLine(line.text);
        const totalBeats = tokens.reduce((sum, t) => sum + t.beats, 0);
        const span = document.createElement('span');
        span.className = 'syllable';
        span.dataset.index = elements.length;
        span.dataset.beats = totalBeats;
        span.textContent = line.iast;
        elements.push(span);
        lineDiv.appendChild(span);
      } else {
        const tokens = prosody.analyzeLine(line.text);

        for (let ti = 0; ti < tokens.length; ti++) {
          const token = tokens[ti];
          const span = document.createElement('span');
          span.dataset.beats = token.beats;

          if (token.isMarker) {
            span.className = 'verse-marker';
            span.textContent = token.text;
            elements.push(span);
          } else {
            span.className = 'syllable';
            span.dataset.index = elements.length;
            span.textContent = currentMode === 'asterisk' ? '\u2731' : token.text;
            elements.push(span);
          }

          lineDiv.appendChild(span);

          if (token.wordEnd) {
            lineDiv.appendChild(document.createTextNode('\u2003'));
          }
        }
      }

      for (let i = elements.length - 1; i >= lineStartIndex; i--) {
        if (!elements[i].classList.contains('verse-marker')) {
          elements[i].dataset.lineEnd = '1';
          break;
        }
      }

      target.appendChild(lineDiv);
    }

    return elements;
  }

  /** Render page into the active (visible) buffer. */
  function renderPage(pageData) {
    currentPageData = pageData;
    syllableElements = renderInto(buffers[activeBuffer], pageData);
    backBuffer = null;
  }

  /** Pre-render the next page into the hidden buffer. */
  function prefetchPage(pageIndex, chapterNum) {
    const pageData = dataLayer.getPage(pageIndex);
    if (!pageData) { backBuffer = null; return; }
    const hiddenIdx = 1 - activeBuffer;
    const elements = renderInto(buffers[hiddenIdx], pageData);
    backBuffer = { index: pageIndex, chapterNum: chapterNum, elements: elements, pageData: pageData };
  }

  /** Swap hidden buffer to visible. Returns true if the prefetched page matched. */
  function swapPrefetched(pageIndex, chapterNum) {
    if (!backBuffer) return false;
    if (backBuffer.index !== pageIndex || backBuffer.chapterNum !== chapterNum) return false;

    // Hide current, show prefetched — no DOM rebuild
    buffers[activeBuffer].style.display = 'none';
    activeBuffer = 1 - activeBuffer;
    buffers[activeBuffer].style.display = '';

    currentPageData = backBuffer.pageData;
    syllableElements = backBuffer.elements;
    backBuffer = null;
    return true;
  }

  /** Invalidate back buffer (e.g. on chapter change or mode switch). */
  function invalidatePrefetch() {
    backBuffer = null;
    buffers[1 - activeBuffer].textContent = '';
  }

  function setMode(mode) {
    currentMode = mode;

    // Update button states
    const buttons = document.querySelectorAll('.mode-btn');
    buttons.forEach(function(btn) {
      if (btn.dataset.mode === mode) {
        btn.classList.add('selected');
      } else {
        btn.classList.remove('selected');
      }
    });

    // Re-render if we have page data
    invalidatePrefetch();
    if (currentPageData) {
      renderPage(currentPageData);
    }
  }

  function getSyllableElements() {
    return syllableElements;
  }

  return {
    renderPage: renderPage,
    prefetchPage: prefetchPage,
    swapPrefetched: swapPrefetched,
    invalidatePrefetch: invalidatePrefetch,
    setMode: setMode,
    getSyllableElements: getSyllableElements,
    getMode: function() { return currentMode; }
  };
})();

// ============================================================
// Task 5: Animation Engine
// ============================================================
const animator = (function() {
  'use strict';

  let isPlaying = false;
  let currentIndex = -1;
  let timeoutId = null;
  let bpm = 380; // internal beats; displayed as whole notes (bpm/4), default 95

  const pointer = document.getElementById('pointer');
  const btnPlay = document.getElementById('btn-play');
  const btnPause = document.getElementById('btn-pause');

  function getBeatMs() {
    return 60000 / bpm;
  }

  function setBpm(newBpm) {
    bpm = Math.max(40, Math.min(600, newBpm));
  }

  function play() {
    isPlaying = true;
    btnPlay.style.display = 'none';
    btnPause.style.display = '';
    advance();
  }

  function pause() {
    isPlaying = false;
    if (timeoutId) {
      clearTimeout(timeoutId);
      timeoutId = null;
    }
    btnPlay.style.display = '';
    btnPause.style.display = 'none';
  }

  function reset() {
    pause();
    const elems = renderer.getSyllableElements();
    for (let i = 0; i < elems.length; i++) {
      elems[i].classList.remove('active');
      elems[i].classList.remove('done');
    }
    currentIndex = -1;
    hidePointer();
  }

  function advance() {
    if (!isPlaying) return;

    const elems = renderer.getSyllableElements();

    // Mark previous element as done
    if (currentIndex >= 0 && currentIndex < elems.length) {
      elems[currentIndex].classList.remove('active');
      elems[currentIndex].classList.add('done');
    }

    currentIndex++;

    // Past end — auto-advance to next page if available, otherwise stop
    if (currentIndex >= elems.length) {
      isPlaying = false;
      btnPlay.style.display = '';
      btnPause.style.display = 'none';
      hidePointer();
      // Auto-advance to next page instantly
      timeoutId = setTimeout(async function() {
        await ui.nextPage();
        animator.play();
      }, 0);
      return;
    }

    // Skip verse markers (danda / double danda) — they are not pronounced
    // but add a natural pause between lines
    const el = elems[currentIndex];
    if (el.classList.contains('verse-marker')) {
      el.classList.add('done');
      currentIndex++;
      // No extra pause — the preceding syllable's line-end pause covers it
      return advance();
    }

    // Activate current element
    el.classList.add('active');

    const beats = parseInt(el.dataset.beats, 10) || 1;
    const durationMs = beats * getBeatMs();

    // Find the next non-marker syllable
    var nextIdx = currentIndex + 1;
    while (nextIdx < elems.length && elems[nextIdx].classList.contains('verse-marker')) {
      nextIdx++;
    }

    if (el.dataset.lineEnd) {
      // Line end: snap pointer to current, then after duration jump to next line and pause
      positionPointerInstant(el);
      timeoutId = setTimeout(function() {
        el.classList.remove('active');
        el.classList.add('done');
        // Mark skipped dandas as done
        for (var i = currentIndex + 1; i < nextIdx; i++) {
          elems[i].classList.add('done');
        }
        currentIndex = nextIdx - 1;
        if (nextIdx < elems.length) {
          positionPointerInstant(elems[nextIdx]);
        }
        // Wait 1 laghu then advance
        timeoutId = setTimeout(advance, getBeatMs());
      }, durationMs);
    } else if (nextIdx < elems.length) {
      // Glide pointer from current toward next syllable over the duration
      positionPointerInstant(el);
      requestAnimationFrame(function() {
        positionPointer(elems[nextIdx], durationMs);
      });
      timeoutId = setTimeout(advance, durationMs);
    } else {
      // Last syllable on the page
      positionPointerInstant(el);
      timeoutId = setTimeout(advance, durationMs);
    }
  }

  function positionPointer(el, transitionMs) {
    const rect = el.getBoundingClientRect();
    if (transitionMs !== undefined) {
      pointer.style.transition = 'left ' + (transitionMs / 1000) + 's linear, top 0.15s ease-out';
    }
    pointer.style.display = 'block';
    pointer.style.left = (rect.left + rect.width / 2 - 18) + 'px';
    pointer.style.top = (rect.top - 40) + 'px';
  }

  function positionPointerInstant(el) {
    pointer.style.transition = 'none';
    const rect = el.getBoundingClientRect();
    pointer.style.display = 'block';
    pointer.style.left = (rect.left + rect.width / 2 - 18) + 'px';
    pointer.style.top = (rect.top - 40) + 'px';
    // Force reflow so 'none' takes effect before we re-enable transitions
    pointer.offsetWidth;
  }

  function hidePointer() {
    pointer.style.display = 'none';
  }

  function getState() {
    return { isPlaying: isPlaying, currentIndex: currentIndex, bpm: bpm };
  }

  function restore(state) {
    // Stop any running animation
    if (timeoutId) clearTimeout(timeoutId);
    isPlaying = false;

    const elems = renderer.getSyllableElements();
    currentIndex = Math.min(state.currentIndex, elems.length - 1);

    // Re-apply active/done classes to match previous state
    for (let i = 0; i < elems.length; i++) {
      if (i < currentIndex) {
        elems[i].classList.add('done');
      } else if (i === currentIndex && currentIndex >= 0) {
        elems[i].classList.add('active');
        positionPointerInstant(elems[i]);
      }
    }

    // Resume playing if it was playing
    if (state.isPlaying && currentIndex >= 0) {
      isPlaying = true;
      btnPlay.style.display = 'none';
      btnPause.style.display = '';
      const beats = parseInt(elems[currentIndex].dataset.beats, 10) || 1;
      const lineEndPause = elems[currentIndex].dataset.lineEnd ? 1 : 0;
      timeoutId = setTimeout(advance, (beats + lineEndPause) * getBeatMs());
    } else if (currentIndex < 0) {
      hidePointer();
    }
  }

  return {
    play: play,
    pause: pause,
    reset: reset,
    setBpm: setBpm,
    getState: getState,
    restore: restore,
    getBeatMs: getBeatMs
  };
})();

// ============================================================
// Task 6: UI Controller
// ============================================================
const ui = (function() {
  'use strict';

  let currentPage = 0;
  const chapterSelect = document.getElementById('chapter-select');

  async function loadChapter(chapterNum) {
    try {
      renderer.invalidatePrefetch();
      const result = await dataLayer.fetchChapter(chapterNum);
      console.log('Chapter loaded:', result);
      currentPage = 0;
      showPage(0);
      chapterSelect.value = chapterNum;
    } catch (err) {
      console.error('Load failed:', err);
    }
  }

  async function init() {
    await loadChapter(0);
  }

  function showPage(index) {
    animator.reset();
    const chNum = dataLayer.getCurrentChapterNum();

    // Try swapping in the pre-rendered buffer (instant, no DOM rebuild)
    if (!renderer.swapPrefetched(index, chNum)) {
      // Fallback: render directly
      const page = dataLayer.getPage(index);
      if (!page) return;
      renderer.renderPage(page);
    }

    currentPage = index;
    updatePageInfo();

    // Pre-render the next page into the hidden buffer
    var nextIdx = currentPage + 1;
    if (nextIdx < dataLayer.getPageCount()) {
      renderer.prefetchPage(nextIdx, chNum);
    } else if (chNum < 18) {
      // At chapter end, prefetch first page of next chapter (data already prefetched by dataLayer)
      // Will be rendered on demand when the chapter actually loads
    }
  }

  function updatePageInfo() {
    const total = dataLayer.getPageCount();
    const el = document.getElementById('page-info');
    el.textContent = (currentPage + 1) + ' / ' + total;
  }

  async function nextPage() {
    if (currentPage < dataLayer.getPageCount() - 1) {
      showPage(currentPage + 1);
    } else {
      // Last page of chapter — advance to next chapter
      var chNum = dataLayer.getCurrentChapterNum();
      if (chNum < 18) {
        await loadChapter(chNum + 1);
      }
    }
  }

  function prevPage() {
    if (currentPage > 0) {
      showPage(currentPage - 1);
    } else {
      // First page of chapter — go to previous chapter's last page
      var chNum = dataLayer.getCurrentChapterNum();
      if (chNum > 0) {
        dataLayer.fetchChapter(chNum - 1).then(function() {
          chapterSelect.value = chNum - 1;
          currentPage = dataLayer.getPageCount() - 1;
          showPage(currentPage);
        });
      }
    }
  }

  function playWithCountdown() {
    if (currentPage === 0 && animator.getState().currentIndex < 0) {
      startCountdown(function() { animator.play(); });
    } else {
      animator.play();
    }
  }

  function startCountdown(callback) {
    var countdownOverlay = document.getElementById('countdown-overlay');
    var countdownNumber = countdownOverlay.querySelector('.countdown-number');
    countdownOverlay.style.display = 'flex';
    broadcastState();
    var count = 5;
    countdownNumber.textContent = count;
    var interval = setInterval(function() {
      count--;
      if (count <= 0) {
        clearInterval(interval);
        countdownOverlay.style.display = 'none';
        broadcastState();
        if (callback) callback();
      } else {
        countdownNumber.textContent = count;
        broadcastState();
      }
    }, 1000);
  }

  // --- Projector sync via BroadcastChannel ---
  var projectorChannel = new BroadcastChannel('gita-projector');

  function broadcastState() {
    var displayEl = document.getElementById('display');
    projectorChannel.postMessage({
      type: 'sync',
      html: displayEl.innerHTML
    });
  }

  // Broadcast on any DOM change in #display
  var displayObserver = new MutationObserver(function() { broadcastState(); });

  function bindControls() {
    displayObserver.observe(document.getElementById('display'), { childList: true, subtree: true, attributes: true, characterData: true });

    document.getElementById('btn-play').addEventListener('click', function() {
      playWithCountdown();
    });
    document.getElementById('btn-pause').addEventListener('click', function() {
      animator.pause();
    });
    document.getElementById('btn-reset').addEventListener('click', function() {
      animator.reset();
    });
    document.getElementById('btn-prev').addEventListener('click', function() {
      prevPage();
    });
    document.getElementById('btn-next').addEventListener('click', function() {
      nextPage();
    });

    chapterSelect.addEventListener('change', function() {
      loadChapter(parseInt(chapterSelect.value, 10));
    });

    var sbmDisplay = document.getElementById('sbm-display');
    function updateSbmDisplay() {
      sbmDisplay.textContent = Math.round(animator.getState().bpm / 4);
    }
    document.getElementById('sbm-up').addEventListener('click', function() {
      animator.setBpm(animator.getState().bpm + 20);
      updateSbmDisplay();
    });
    document.getElementById('sbm-down').addEventListener('click', function() {
      animator.setBpm(animator.getState().bpm - 20);
      updateSbmDisplay();
    });
    document.addEventListener('keydown', function(e) {
      if (e.key === '+' || e.key === '=') {
        animator.setBpm(animator.getState().bpm + 20);
        updateSbmDisplay();
      } else if (e.key === '-' || e.key === '_') {
        animator.setBpm(animator.getState().bpm - 20);
        updateSbmDisplay();
      }
    });

    var modeBtns = document.querySelectorAll('.mode-btn');
    modeBtns.forEach(function(btn) {
      btn.addEventListener('click', function() {
        var state = animator.getState();
        renderer.setMode(btn.dataset.mode);
        animator.restore(state);
      });
    });

    document.addEventListener('keydown', function(e) {
      if (e.code === 'Space') {
        e.preventDefault();
        var state = animator.getState();
        if (state.isPlaying) {
          animator.pause();
        } else {
          playWithCountdown();
        }
      } else if (e.code === 'ArrowRight') {
        nextPage();
      } else if (e.code === 'ArrowLeft') {
        prevPage();
      } else if (e.code === 'KeyR') {
        animator.reset();
      }
    });

    // --- Issue #2: Pace indicators (speed up / slow down) ---
    var paceIndicator = document.getElementById('pace-indicator');
    var btnSpeedup = document.getElementById('btn-speedup');
    var btnSlowdown = document.getElementById('btn-slowdown');
    var btnClearPace = document.getElementById('btn-clear-pace');

    function setPace(mode) {
      btnSpeedup.classList.remove('active');
      btnSlowdown.classList.remove('active');
      if (mode === 'speedup') {
        paceIndicator.textContent = '\u26A1';
        paceIndicator.style.display = 'block';
        btnSpeedup.classList.add('active');
      } else if (mode === 'slowdown') {
        paceIndicator.textContent = '\u270B';
        paceIndicator.style.display = 'block';
        btnSlowdown.classList.add('active');
      } else {
        paceIndicator.style.display = 'none';
      }
      broadcastState();
    }

    btnSpeedup.addEventListener('click', function() {
      setPace(btnSpeedup.classList.contains('active') ? 'none' : 'speedup');
    });
    btnSlowdown.addEventListener('click', function() {
      setPace(btnSlowdown.classList.contains('active') ? 'none' : 'slowdown');
    });
    btnClearPace.addEventListener('click', function() { setPace('none'); });

    // --- Projector window ---
    document.getElementById('btn-project').addEventListener('click', function() {
      window.open('projector.html', 'gita-projector', 'width=1280,height=720');
    });
  }

  return { init: init, bindControls: bindControls, nextPage: nextPage, prevPage: prevPage };
})();

document.addEventListener('DOMContentLoaded', function() {
  ui.bindControls();
  ui.init();
});

</script>
</body>
</html>
